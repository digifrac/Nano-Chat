<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat with us</title>
  <script>(function(){var t=localStorage.getItem('nano-call.theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="css/style.css?v=5" />
</head>
<body class="widget">
  <main class="wphone">
    <header class="wbar">
      <span class="wbrand">
        <img id="logo" class="wlogo hidden" alt="" />
        <span class="wavatar" id="brandAvatar" aria-hidden="true"></span>
        <span class="wtitle">Chat with <span id="brandName">us</span></span>
      </span>
      <button class="iconBtn closeBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 0 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z"/></svg>
      </button>
    </header>

    <!-- 1. choose subject + first message, then start the chat -->
    <section id="intro" class="wscreen">
      <p class="offlineNote hidden" id="offlineNote">We are offline right now - please check back when we are online.</p>
      <p class="lede" id="greeting"></p>

      <div class="field" id="subjectRow">
        <label for="subject">What is it about?</label>
        <div class="selectWrap">
          <select id="subject"></select>
          <svg class="selectChev" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="firstMsg">Your message</label>
        <textarea id="firstMsg" rows="3" maxlength="4000" placeholder="Type your message…"></textarea>
      </div>

      <button id="startBtn" class="primary big">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H8l-4 4V5a1 1 0 0 1 1-1z"/></svg>
        <span class="label">Start chat</span>
      </button>
      <p class="hint" id="startHint" role="status"></p>

      <p class="trust">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3zm0 6a2 2 0 0 1 1 3.7V14a1 1 0 1 1-2 0v-2.3A2 2 0 0 1 12 8z"/></svg>
        No account needed. Nothing to install.
      </p>
    </section>

    <!-- 2. live conversation -->
    <section id="chat" class="wscreen chatScreen hidden">
      <p class="chatStatus" id="chatStatus" role="status"></p>
      <div class="thread" id="thread" aria-live="polite"></div>
      <form class="composer" id="composer">
        <input id="msgInput" autocomplete="off" placeholder="Type a message…" maxlength="4000" />
        <button type="submit" class="primary sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
        </button>
      </form>
    </section>

    <p class="poweredBy hidden" id="poweredBy">
      Powered by <a href="https://www.digitalfracture.co.uk/nano.php" target="_blank" rel="noopener noreferrer">Nano Chat</a>.
      Developed by <a href="https://digitalfracture.co.uk/" target="_blank" rel="noopener noreferrer">Digital Fracture</a>.
    </p>
  </main>

  <script src="js/core.js?v=6"></script>
  <script src="js/widget.js?v=6"></script>
</body>
</html>
